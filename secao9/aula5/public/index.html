<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Modelo</title>
</head>

<body>

  <section class="container">
    <h1>Gerador de senha</h1>
    
    <div class="senha-gerada"></div>

    <label>Quantidade de caracteres</label>
    <input type="number" value="10" min="1" max="20" class="qtd-caracteres"> <br>
    <label>Adicionar maiusculas</label>
    <input type="checkbox" class="chk-maiusculas"><br>
    <label>Adicionar minusculas</label>
    <input type="checkbox" class="chk-minusculas"><br>
    <label>Adicionar numeros</label>
    <input type="checkbox" class="chk-numeros"><br>
    <label>Adicionar simbolos</label>
    <input type="checkbox" class="chk-simbolos"><br>

    <button class="gerar-senha">Gerar Senha</button>

  </section>

  <script src="./assets/js/bundle.js"></script>
</body>

</html>
