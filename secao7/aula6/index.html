<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Modelo</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <section class="container">
    <h1>Formulario</h1>
    <ul>
      <li>Nenhum campo pode estar vazio</li>
      <li>Usuario so pode conter letras e numeros</li>
      <li>Usuario deve ter entre 3 e 12 caracteres</li>
      <li>Senha deve ter entre 6 e 12 caracteres</li>
    </ul>

    <form action="/" method="post" class="formulario">
      <label for="nome">Nome:</label>
      <input type="text" placeholder="Nome:" class="nome validar">
      <label for="sobrenome">Sobrenome:</label>
      <input type="text" placeholder="Sobrenome:" class="sobrenome validar">
      <label for="cpf">CPF:</label>
      <input type="text" placeholder="CPF:" class="cpf validar">
      <label for="usuario">Usuario:</label>
      <input type="text" placeholder="Usuario:" class="usuario validar">
      <label for="senha">Senha:</label>
      <input type="password" placeholder="Senha:" class="senha validar">
      <label for="repetir-senha">Repetir a senha:</label>
      <input type="password" placeholder="Senha:" class="repetir-senha validar">
      <button type="submit" id="btn">Enviar</button>
    </form>
  </section>

  <script src="./assets//js/validaCPF.js"></script>
  <script src="./assets/js/main.js"></script>
</body>

</html>
